# =====================================================================
# App of Apps — Stg Root Application
#
# Watches apps/shared/ and apps/stg/ directories. Each YAML file in
# those directories becomes a child Application in the argocd namespace.
#
# The prd cluster uses a separate root-app-prd.yaml that watches
# apps/shared/ and apps/prd/ instead.
# =====================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devsecops-root
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/sycanz/devsecops-gitops.git
      targetRevision: main
      path: apps/shared
    - repoURL: https://github.com/sycanz/devsecops-gitops.git
      targetRevision: main
      path: apps/stg
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
