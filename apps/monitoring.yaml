# Child App: kube-prometheus-stack
# Installs Prometheus, Alertmanager, Grafana, kube-state-metrics,
# and node-exporter on the cluster. Grafana on the home server
# scrapes this Prometheus via Tailscale.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 70.x.x
    helm:
      valuesFiles:
        - charts/monitoring-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
