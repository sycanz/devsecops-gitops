# Child App: Kyverno Policies
# Deploys the custom Kyverno ClusterPolicies (disallow root,
# verify images, etc.) from the policies/ directory.
# Sync wave 5 ensures Kyverno CRDs are ready first.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/sycanz/devsecops-gitops.git
    targetRevision: main
    path: policies
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
