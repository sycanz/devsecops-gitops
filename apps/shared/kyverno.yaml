# Child App: Kyverno (core engine)
# Sync wave -1 ensures CRDs register before other apps start.
# ServerSideApply handles large CRD schemas without annotation limits.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://kyverno.github.io/kyverno
    chart: kyverno
    targetRevision: 3.8.1
    helm:
      values: |
        initContainer:
          extraArgs:
            - --imagePullSecrets=ecr
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
