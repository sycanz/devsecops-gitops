# Child App: kube-prometheus-stack (monitoring)
# Sync wave 0 (default, runs after kyverno wave -1).
# ServerSideApply handles large CRDs (prometheus, alertmanager, etc.).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 70.x.x
    helm:
      valuesFiles:
        - charts/monitoring-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
