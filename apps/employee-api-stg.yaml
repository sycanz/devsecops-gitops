# Child App: Employee Directory API — staging
# Deploys the Go app and Kyverno policies to the stg cluster.
# Image tag is updated by the CI pipeline after each build.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: employee-api-stg
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sycanz/devsecops-gitops.git
    targetRevision: main
    path: stg
  destination:
    server: https://STG_CLUSTER_ENDPOINT
    namespace: employee-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
