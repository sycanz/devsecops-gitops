apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image
  annotations:
    policies.kyverno.io/title: Verify Image Signature
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Verifies that all container images have been signed by the CI pipeline
      using Cosign keyless signing. Unsigned images are rejected at admission.
spec:
  validationFailureAction: Enforce
  background: false
  webhookTimeoutSeconds: 30
  rules:
    - name: verify-cosign
      match:
        any:
        - resources:
            kinds:
              - Pod
      exclude:
        any:
        - resources:
            namespaces:
              - kube-system
              - monitoring
      verifyImages:
      - image: "*"
        skipImageReferences:
        - "registry.k8s.io/*"
        - "gcr.io/*"
        - "docker.io/*"
        - "quay.io/*"
        attestors:
        - entries:
          - keyless:
              rekor:
                url: https://rekor.sigstore.dev
              issuer: https://token.actions.githubusercontent.com
              subjectRegExp: "https://github.com/sycanz/devsecops/.*"
