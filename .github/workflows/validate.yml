name: Validate & Promote

on:
  pull_request:
    branches:
      - main

jobs:
  kyverno-cli:
    name: Kyverno Policy Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Kyverno CLI
        uses: kyverno/action-install-cli@v0.2.0

      - name: Validate manifests against policies
        run: |
          kyverno apply policies/ --resource stg/ --resource prd/ --output violations.json

      - name: Upload violations report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kyverno-violations
          path: violations.json

  owasp-zap:
    name: DAST — OWASP ZAP (stg cluster)
    runs-on: ubuntu-latest
    needs: kyverno-cli
    permissions:
      id-token: write
    steps:
      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ secrets.STG_APP_URL }}
          rules_file_name: .zap/rules.tsv
          cmd_options: "-a -j -x zap-report.xml"

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zap-report
          path: report_html.html

      - name: Connect to Tailscale
        if: always()
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OIDC_CLIENT_ID }}
          audience: ${{ secrets.TS_OIDC_AUDIENCE }}
          tags: tag:ci

      - name: Ingest ZAP results to DefectDojo
        if: always()
        run: |
          curl -X POST ${{ secrets.DEFECTDOJO_URL }} \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
            -F "scan_type=ZAP Scan" \
            -F "file=@zap-report.xml" \
            -F "engagement=3" \
            -F "minimum_severity=Low"

  result:
    name: PR Check Summary
    runs-on: ubuntu-latest
    needs: [kyverno-cli, owasp-zap]
    if: always()
    steps:
      - name: Check all gates passed
        run: |
          echo "## PR Promotion Checks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Kyverno CLI: ${{ needs.kyverno-cli.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ OWASP ZAP: ${{ needs.owasp-zap.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.kyverno-cli.result }}" = "success" ] && [ "${{ needs.owasp-zap.result }}" = "success" ]; then
            echo "✅ **All checks passed — ready for review.**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some checks failed — fix before requesting review.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
